name: Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-ec2-backend
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.EC2_DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/var/www/BabyBarn-Backend"; fi
            cd "$APP_DIR"
            chmod +x deploy/deploy-backend.sh deploy/rollback.sh 2>/dev/null || true
            bash deploy/deploy-backend.sh
